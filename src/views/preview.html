<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline';">
  <title>{{SKILL_NAME}} – Skill Preview</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--vscode-font-family, "Inter", -apple-system, BlinkMacSystemFont, sans-serif);
      background: var(--vscode-editor-background, #1e1e2e);
      color: var(--vscode-foreground, #cdd6f4);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 24px;
    }

    .preview-card {
      width: 100%;
      max-width: 640px;
      background: var(--vscode-editorWidget-background, rgba(255, 255, 255, 0.04));
      border: 1px solid var(--vscode-panel-border, rgba(255, 255, 255, 0.1));
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .card-header {
      padding: 32px 32px 24px;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.15) 0%, rgba(168, 85, 247, 0.1) 100%);
      border-bottom: 1px solid var(--vscode-panel-border, rgba(255, 255, 255, 0.08));
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .hero-icon {
      width: 72px;
      height: 72px;
      font-size: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.3), rgba(168, 85, 247, 0.3));
      border-radius: 18px;
      border: 1px solid rgba(99, 102, 241, 0.3);
      flex-shrink: 0;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.2);
    }

    .header-text {
      flex: 1;
      min-width: 0;
    }

    .skill-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--vscode-foreground, #e2e8f0);
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .skill-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      background: rgba(99, 102, 241, 0.2);
      border: 1px solid rgba(99, 102, 241, 0.35);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      color: #a5b4fc;
      letter-spacing: 0.3px;
    }

    .card-body {
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--vscode-descriptionForeground, rgba(255, 255, 255, 0.4));
    }

    .field-value {
      font-size: 14px;
      color: var(--vscode-foreground, #cdd6f4);
      line-height: 1.6;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border: 1px solid var(--vscode-panel-border, rgba(255, 255, 255, 0.06));
      word-break: break-all;
    }

    .field-value.mono {
      font-family: var(--vscode-editor-font-family, "Courier New", monospace);
      font-size: 12px;
      color: #94e2d5;
    }

    .field-value.description {
      line-height: 1.7;
      font-size: 13px;
    }

    .url-row {
      display: flex;
      align-items: stretch;
      gap: 8px;
    }

    .url-link {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border: 1px solid rgba(99, 102, 241, 0.2);
      text-decoration: none;
      color: #818cf8;
      font-size: 12px;
      font-family: var(--vscode-editor-font-family, "Courier New", monospace);
      word-break: break-all;
      transition: all 0.15s ease;
      cursor: pointer;
      min-width: 0;
    }

    .url-link:hover {
      background: rgba(99, 102, 241, 0.12);
      border-color: rgba(99, 102, 241, 0.5);
      color: #a5b4fc;
    }

    .url-icon {
      flex-shrink: 0;
      font-size: 14px;
    }

    .copy-btn {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 0 14px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: 8px;
      color: #a5b4fc;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      font-family: inherit;
    }

    .copy-btn:hover {
      background: rgba(99, 102, 241, 0.2);
      border-color: rgba(99, 102, 241, 0.5);
      color: #c4b5fd;
    }

    .copy-btn:active {
      transform: scale(0.96);
    }

    .copy-btn.copied {
      background: rgba(52, 211, 153, 0.15);
      border-color: rgba(52, 211, 153, 0.4);
      color: #6ee7b7;
    }

    .copy-icon {
      font-size: 13px;
    }

    .copy-label {
      letter-spacing: 0.2px;
    }

    .divider {
      height: 1px;
      background: var(--vscode-panel-border, rgba(255, 255, 255, 0.06));
    }

    .card-footer {
      padding: 16px 32px;
      background: rgba(0, 0, 0, 0.15);
      border-top: 1px solid var(--vscode-panel-border, rgba(255, 255, 255, 0.06));
    }

    .footer-btns {
      display: flex;
      gap: 10px;
    }

    .install-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #10b981, #059669);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .install-btn:hover:not([disabled]) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(16, 185, 129, 0.4);
    }

    .install-btn:active:not([disabled]) {
      transform: translateY(0);
    }

    .install-btn[disabled] {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .install-btn.loading {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
    }

    .install-btn.error {
      background: linear-gradient(135deg, #ef4444, #dc2626);
    }

    .install-status {
      margin-top: 8px;
      font-size: 11px;
      color: var(--vscode-descriptionForeground, rgba(255, 255, 255, 0.5));
      min-height: 16px;
      text-align: center;
    }

    .uninstall-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .uninstall-btn:hover:not([disabled]) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(239, 68, 68, 0.4);
    }

    .uninstall-btn:active:not([disabled]) {
      transform: translateY(0);
    }

    .uninstall-btn[disabled] {
      opacity: 0.3;
      cursor: not-allowed;
    }
  </style>
</head>

<body>
  <div class="preview-card">
    <div class="card-header">
      <div class="hero-icon">{{SKILL_ICON}}</div>
      <div class="header-text">
        <div class="skill-title">{{SKILL_NAME}}</div>
        <span class="skill-badge">⚡ Skill</span>
      </div>
    </div>
    <div class="card-body">
      <div class="field">
        <div class="field-label">Description</div>
        <div class="field-value description">{{SKILL_DESC}}</div>
      </div>
      <div class="divider"></div>
      <div class="field">
        <div class="field-label">Skill ID</div>
        <div class="field-value mono">{{SKILL_ID}}</div>
      </div>
      <div class="field">
        <div class="field-label">Repository URL</div>
        <div class="url-row">
          <a class="url-link" id="urlLink"><span class="url-icon">🔗</span><span>{{SKILL_URL}}</span></a>
          <button class="copy-btn" id="copyBtn"><span class="copy-icon">⎘</span><span
              class="copy-label">Copy</span></button>
        </div>
      </div>
    </div>
    <div class="card-footer">
      <div class="footer-btns">
        <button class="install-btn" id="installBtn" {{INSTALL_BTN_DISABLED}}>
          <span>{{INSTALL_ICON}}</span>
          <span class="install-label">{{INSTALL_LABEL}}</span>
        </button>
        <button class="uninstall-btn" id="uninstallBtn" {{UNINSTALL_BTN_DISABLED}}>
          <span>🗑️</span>
          <span class="uninstall-label">Uninstall</span>
        </button>
      </div>
      <div class="install-status" id="installStatus"></div>
    </div>
  </div>
  <script id="skillData" type="application/json">
{{SKILL_JSON}}
</script>
  <script>
    var vscodeApi = acquireVsCodeApi();
    var skill = JSON.parse(document.getElementById("skillData").textContent);
    document.getElementById("urlLink").addEventListener("click", function () {
      vscodeApi.postMessage({ command: "openLink", url: skill.url });
    });
    document.getElementById("copyBtn").addEventListener("click", function () {
      vscodeApi.postMessage({ command: "copyToClipboard", text: skill.url });
    });
    document.getElementById("installBtn").addEventListener("click", function () {
      if (this.disabled) { return; }
      this.disabled = true;
      this.classList.add("loading");
      this.querySelector(".install-label").textContent = "Installing...";
      document.getElementById("installStatus").textContent = "";
      vscodeApi.postMessage({ command: "installSkill", skill: skill });
    });
    document.getElementById("uninstallBtn").addEventListener("click", function () {
      if (this.disabled) { return; }
      this.disabled = true;
      this.querySelector(".uninstall-label").textContent = "Removing...";
      document.getElementById("installStatus").textContent = "";
      vscodeApi.postMessage({ command: "uninstallSkill", skill: skill });
    });
    window.addEventListener("message", function (e) {
      var d = e.data; if (!d) return;
      var installBtn = document.getElementById("installBtn");
      var uninstallBtn = document.getElementById("uninstallBtn");
      var status = document.getElementById("installStatus");
      if (d.command === "copySuccess") {
        var btn = document.getElementById("copyBtn");
        btn.classList.add("copied");
        btn.querySelector(".copy-icon").textContent = "\u2713";
        btn.querySelector(".copy-label").textContent = "Copied!";
        setTimeout(function () {
          btn.classList.remove("copied");
          btn.querySelector(".copy-icon").textContent = "\u2358";
          btn.querySelector(".copy-label").textContent = "Copy";
        }, 2000);
      } else if (d.command === "installProgress") {
        status.textContent = d.message;
      } else if (d.command === "installSuccess") {
        installBtn.classList.remove("loading", "error");
        installBtn.disabled = true;
        installBtn.querySelector("span").textContent = "\u2713";
        installBtn.querySelector(".install-label").textContent = "Installed";
        uninstallBtn.disabled = false;
        status.textContent = "Skill installed to .agents/skills/.";
      } else if (d.command === "installError") {
        installBtn.classList.remove("loading");
        installBtn.classList.add("error");
        installBtn.disabled = false;
        installBtn.querySelector("span").textContent = "\u2715";
        installBtn.querySelector(".install-label").textContent = "Retry";
        status.textContent = "Install error: " + d.message;
      } else if (d.command === "uninstallSuccess") {
        installBtn.classList.remove("loading", "error");
        installBtn.disabled = false;
        installBtn.querySelector("span").textContent = "\u2b07";
        installBtn.querySelector(".install-label").textContent = "Install";
        uninstallBtn.disabled = true;
        uninstallBtn.querySelector(".uninstall-label").textContent = "Uninstall";
        status.textContent = "Skill removed.";
      } else if (d.command === "uninstallError") {
        uninstallBtn.disabled = false;
        uninstallBtn.querySelector(".uninstall-label").textContent = "Uninstall";
        status.textContent = "Uninstall error: " + d.message;
      } else if (d.command === "uninstallCancelled") {
        uninstallBtn.disabled = false;
        uninstallBtn.querySelector(".uninstall-label").textContent = "Uninstall";
      }
    });
  </script>
</body>

</html>
